name: autofix.ci

on:
  workflow_call:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: write

env:
  rust_clippy: "1.65.0"

jobs:
  autofix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache cargo + target
        uses: actions/cache@b7e8d49f17405cc70c1c120101943203c98d3a4b
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: autofix-${{ runner.os }}-rust-${{ env.rust_clippy }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            autofix-${{ runner.os }}-rust-${{ env.rust_clippy }}-
            autofix-${{ runner.os }}-

      - name: Install toolchain (rustfmt + clippy)
        run: |
          rustup toolchain install "${{ env.rust_clippy }}" --profile minimal --component rustfmt clippy
          rustup default "${{ env.rust_clippy }}"
          rustc -V
          cargo -V

      - name: Run clippy fixes
        run: cargo clippy --fix --workspace --all-targets --all-features

      - name: Format
        run: cargo fmt --all

      - name: Autofix commit + push
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        uses: autofix-ci/action@7a166d7532b277f34e16238930461bf77f9d7ed8